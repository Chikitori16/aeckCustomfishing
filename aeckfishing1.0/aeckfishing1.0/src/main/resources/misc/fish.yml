# ===================================================
#  fish.yml — Cau hinh ca tuy chinh cho CustomFish
#
#  Rarity        : trong so xuat hien (so cang lon ty le cang cao)
#  Material      : ten Material cua Bukkit (COD, SALMON, TROPICAL_FISH, ...)
#  Weight_Range  : [min_kg, max_kg]
#  Length_Range  : [min_cm, max_cm]
#  Price_Per_Kg  : gia moi kg (tong gia = gia_moi_kg x can_nang)
#  Time_Required : DAY (tick 0-12000) | NIGHT (tick 13000-23000)
#  Biomes           : danh sach Biome (theo Bukkit API). De trong = tat ca Biome.
#  Lava_Only        : true = chi xuat hien khi cau tren dung nham
#  Water_Only       : true = chi xuat hien khi cau duoi nuoc (mac dinh)
#  Custom_Model_Data: so nguyen >= 1 de gan model tu resource pack (0 = khong dung)
#  Commands_On_Catch: lenh chay khi bat duoc ca
#    Placeholder    : %player% %fish% %weight% %length%
# ===================================================

Fish:

  # ─── Ca nuoc thuong ─────────────────────────────────────────────────────────

  Red_Snapper:
    Display_Name: "&cCa Hong"
    Rarity: 50
    Material: "SALMON"
    Custom_Model_Data: 0
    Weight_Range: [1.5, 10.0]
    Length_Range: [15.0, 50.0]
    Price_Per_Kg: 50
    Time_Required:
      - "DAY"
      - "NIGHT"
    Biomes:
      - "DEEP_OCEAN"
      - "WARM_OCEAN"
      - "OCEAN"
    Water_Only: true
    Lava_Only: false
    Commands_On_Catch:
      - "broadcast &e%player% vua cau duoc mot con %fish% nang %weight%kg!"

  Clownfish:
